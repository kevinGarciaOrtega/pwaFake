<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fondo azul con esquinas redondeadas -->
  <rect width="192" height="192" rx="42" fill="#29ABE2"/>

  <!-- Texto BanBif en blanco -->
  <text
    x="96"
    y="118"
    font-family="'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif"
    font-size="52"
    font-weight="900"
    text-anchor="middle"
